spring.application.name=line-app

# PostgreSQL接続設定 (Java専用DB)
spring.datasource.url=jdbc:postgresql://ep-late-queen-16733624.us-east-1.postgres.vercel-storage.com/line-app-java?sslmode=require
spring.datasource.username=${POSTGRES_USER:default}
spring.datasource.password=${POSTGRES_PASSWORD:6RqIonDQNgY8}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPAの設定
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# schema.sql / data.sql は自動実行しない (DBは既にNext.jsで構築済み)
spring.sql.init.mode=always

# Jacksonの日時をISO文字列で出力
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=8080
